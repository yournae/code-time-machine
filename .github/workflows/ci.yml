name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      
      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt
          pip install pytest pytest-asyncio
      
      - name: Lint with ruff
        run: |
          pip install ruff
          cd backend
          ruff check . --ignore E501
      
      - name: Run tests
        run: |
          cd backend
          pytest test_analyzer.py -v --tb=short
      
      - name: Security check with pip-audit
        run: |
          pip install pip-audit
          cd backend
          pip-audit -r requirements.txt

  frontend:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      
      - name: Install dependencies
        run: |
          cd frontend
          npm ci || npm install
      
      - name: Type check
        run: |
          cd frontend
          npx tsc --noEmit || true
      
      - name: Lint
        run: |
          cd frontend
          npx next lint || true
      
      - name: Build
        run: |
          cd frontend
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  docker:
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Build backend image
        run: docker build -f docker/Dockerfile.backend -t code-time-machine-backend .
      
      - name: Build frontend image
        run: docker build -f docker/Dockerfile.frontend -t code-time-machine-frontend .
